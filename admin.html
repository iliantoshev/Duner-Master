<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дюнер Мастър – Админ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
body{padding-bottom:0}
/* ── LOGIN SCREEN ── */
#loginScreen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;
}
.login-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:24px;padding:36px 28px;max-width:340px;width:100%;text-align:center;
}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;letter-spacing:0.04em;margin-bottom:4px}
.login-sub{color:var(--text2);font-size:0.875rem;margin-bottom:28px}
.login-error{color:var(--red);font-size:0.82rem;margin-top:10px;display:none}

/* ── DASHBOARD ── */
#dashboard{display:none}
.admin-top{
  background:var(--bg2);border-bottom:1px solid var(--border2);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.admin-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#fff;letter-spacing:0.04em}
.admin-title span{color:var(--red)}
.admin-badge{background:var(--red-dim);border:1px solid var(--border);padding:4px 12px;border-radius:100px;font-size:0.75rem;font-weight:700;color:var(--red);}
.admin-body{padding:12px 16px}
.admin-filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.admin-filters::-webkit-scrollbar{display:none}
.af-btn{background:var(--bg3);border:none;padding:7px 14px;border-radius:100px;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:700;color:var(--text2);white-space:nowrap;cursor:pointer;transition:all 0.2s;}
.af-btn.active{background:var(--red);color:#fff}
.orders-list{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.order-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:14px;}
.oc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.oc-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--orange);letter-spacing:0.04em}
.oc-status{padding:4px 10px;border-radius:100px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.status-new{background:rgba(232,65,24,0.2);color:var(--red)}
.status-prep{background:rgba(240,165,0,0.2);color:var(--orange)}
.status-ready{background:rgba(46,213,115,0.2);color:#2ed573}
.status-done{background:rgba(100,100,100,0.2);color:#888}
.oc-name{font-weight:800;color:#fff;font-size:0.95rem}
.oc-phone{font-size:0.82rem;color:var(--text2);margin-bottom:4px}
.oc-items{font-size:0.82rem;color:var(--text2);margin-bottom:8px;line-height:1.6}
.oc-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.oc-total{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;letter-spacing:0.03em}
.oc-total span{color:var(--orange)}
.oc-time{font-size:0.8rem;color:var(--text2)}
.status-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border2)}
.status-btn{padding:8px 14px;border-radius:8px;border:none;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.status-btn:active{opacity:0.7}
.sb-prep{background:rgba(240,165,0,0.2);color:var(--orange)}
.sb-ready{background:rgba(46,213,115,0.2);color:#2ed573}
.sb-done{background:rgba(100,100,100,0.2);color:#aaa}
.no-orders{text-align:center;padding:40px 0;color:var(--text2);font-size:0.9rem}
.logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:7px 12px;color:var(--text2);font-size:0.8rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;transition:border-color 0.2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.sound-dot{width:7px;height:7px;border-radius:50%;background:#2ed573;display:inline-block;animation:pulse 2s infinite}
/* Admin toast */
.toast{top:auto;bottom:20px}
</style>
</head>
<body>

<div class="toast" id="adminToast"></div>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-title">🔐 ADMIN</div>
    <p class="login-sub">Дюнер Мастър · Панагюрище</p>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="adminEmail" placeholder="admin@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Парола</label>
      <input type="password" class="form-input" id="adminPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-submit" id="loginBtn" onclick="login()">Влез</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="admin-top">
    <div>
      <div class="admin-title">ДЮНЕР <span>МАСТЪР</span></div>
      <div style="font-size:0.72rem;color:var(--text2);display:flex;align-items:center;gap:5px;margin-top:2px">
        <span class="sound-dot"></span> Realtime · звук при нова поръчка
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="admin-badge" id="newOrdersBadge">0 нови</div>
      <button class="logout-btn" onclick="logout()">Изход</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="admin-filters">
      <button class="af-btn active" onclick="filterOrders('all',this)">Всички</button>
      <button class="af-btn" onclick="filterOrders('new',this)">🔴 Нови</button>
      <button class="af-btn" onclick="filterOrders('done',this)">✅ Завършени</button>
    </div>
    <div class="orders-list" id="ordersList">
      <div class="no-orders">⏳ Зареждане...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>
<script src="admin.js"></script>
</body>
</html>
